<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUILIN MAO | Photography Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* 1. 全局基础美学 */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #666666;
            --line-color: rgba(255, 255, 255, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 导航栏（复刻细线设计） */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            animation: fadeInUI 1.5s ease forwards;
            animation-delay: 1.5s;
            opacity: 0;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            position: relative;
            padding: 0 10px;
            transition: color 0.3s;
        }

        nav a:not(:last-child)::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 50%;
            width: 20px;
            height: 1px;
            background-color: var(--line-color);
        }

        nav a:hover { color: var(--text-muted); }

        /* 3. 第一屏：你的 Illustrator 原型主视觉 */
        .hero-section {
            display: grid;
            grid-template-columns: 1.1fr 1.4fr;
            height: calc(100vh - 120px);
            align-items: center;
            padding: 0 60px;
            gap: 60px;
        }

        .intro-text {
            max-width: 420px;
            animation: fadeInUI 1.5s ease forwards;
            animation-delay: 1.5s;
            opacity: 0;
        }

        .intro-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            line-height: 1.2;
            margin-bottom: 30px;
        }

        .intro-text p {
            color: #888888;
            font-size: 18px;
            line-height: 1.6;
            font-weight: 300;
        }

        .photo-container {
            position: relative;
            animation: fadeInImage 2s ease-out forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .main-photo {
            width: 100%;
            height: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .photo-watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        /* 4. 📢 新增：下方照片 Showcase 展示区 */
        .showcase-section {
            padding: 150px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 120px; /* 照片与照片之间的留白，拉开高级感 */
        }

        .showcase-title {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            width: 100%;
            text-align: center;
        }

        /* 单张照片包装盒 */
        .showcase-item {
            width: 100%;
            max-width: 900px; /* 控制展示照片的最大宽度 */
            position: relative;
        }

        .showcase-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.8s ease;
        }

        /* 鼠标放上去时，照片会极其细微地放大，增加交互感 */
        .showcase-item:hover img {
            transform: scale(1.01);
        }

        .item-info {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* 5. 动画效果 */
        @keyframes fadeInImage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUI {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手机端适配 */
        @media (max-width: 900px) {
            .hero-section { grid-template-columns: 1fr; height: auto; padding: 40px 20px; }
            .showcase-section { padding: 80px 20px; gap: 60px; }
            header { padding: 30px 20px; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">RUILIN MAO</div>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">About</a>
            <a href="#">Photos</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main class="hero-section">
        <section class="intro-text">
            <h1>Documenting life<br>as it unfolds.</h1>
            <p>Honest perspectives,<br>raw memories,<br>and the quiet beauty of existence.</p>
        </section>

        <section class="photo-container">
            <img src="myphoto.JPG" alt="Selected Work" class="main-photo">
            <div class="photo-watermark">RUILIN MAO 摄影</div>
        </section>
    </main>

    <section class="showcase-section">
        <div class="showcase-title">Selected Showcase / 精选作品</div>

        <div class="showcase-item">
            <img src="photo1.JPG" alt="Showcase 1">
            <div class="item-info">
                <span>01 / Street</span>
                <span>Kyoto Street, 2025</span>
            </div>
        </div>

        <div class="showcase-item">
            <img src="photo2.JPG" alt="Showcase 2">
            <div class="item-info">
                <span>02 / Street</span>
                <span>Believer, 2025</span>
            </div>
        </div>

        <div class="showcase-item">
            <img src="photo3.jpg" alt="Showcase 3">
            <div class="item-info">
                <span>03 / Street</span>
                <span>Shop, 2025</span>
            </div>
        </div>
    </section>

</body>
</html>

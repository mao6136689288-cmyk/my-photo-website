<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUILIN MAO | Photography Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        /* 1. 全局样式：深度纯黑美学 */
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --line-color: rgba(255, 255, 255, 0.15);
            --transition-speed: 1.5s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 导航栏样式：复刻 AI 稿中的细线设计 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            opacity: 0; /* 初始隐藏，用于动画 */
            animation: fadeInUI var(--transition-speed) ease forwards;
            animation-delay: 1.8s; /* UI 最后显示 */
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: default;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 400;
            position: relative;
            padding: 0 10px;
            transition: color 0.3s;
        }

        /* 导航栏中间的细横线 */
        nav a:not(:last-child)::after {
            content: "";
            position: absolute;
            right: -15px;
            top: 50%;
            width: 20px;
            height: 1px;
            background-color: var(--line-color);
        }

        nav a:hover {
            color: var(--text-muted);
        }

        /* 3. 核心布局：两栏式设计 */
        main {
            display: grid;
            grid-template-columns: 1.1fr 1.4fr; /* 非对称比例 */
            height: calc(100vh - 120px);
            align-items: center;
            padding: 0 60px;
            gap: 60px;
        }

        /* 左侧文字区 */
        .intro-text {
            max-width: 420px;
            margin-left: 20px;
            opacity: 0;
            animation: fadeInUI var(--transition-speed) ease forwards;
            animation-delay: 1.8s;
        }

        .intro-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            line-height: 1.2;
            margin-bottom: 30px;
            font-weight: 400;
        }

        .intro-text p {
            color: var(--text-muted);
            font-size: 18px;
            line-height: 1.6;
            font-weight: 300;
        }

        /* 右侧图片区 */
        .photo-container {
            position: relative;
            width: 100%;
            opacity: 0; /* 初始隐藏 */
            animation: fadeInImage 2s ease-out forwards;
            animation-delay: 0.5s; /* 图片先淡入 */
        }

        .main-photo {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid rgba(255,255,255,0.05); /* 极细边框增加质感 */
        }

        /* 复刻 AI 稿中的图片右下角水印 */
        .photo-watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
        }

        /* 4. 动画关键帧 */
        @keyframes fadeInImage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUI {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式调整：手机端自动变为上下排列 */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                height: auto;
                padding-bottom: 100px;
            }
            header { padding: 30px 20px; }
            nav { display: none; } /* 手机端隐藏导航，或可改为菜单按钮 */
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">RUILIN MAO</div>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">About</a>
            <a href="#">Photos</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section class="intro-text">
            <h1>Documenting life<br>as it unfolds.</h1>
            <p>
                Honest perspectives,<br>
                raw memories,<br>
                and the quiet beauty of existence.
            </p>
        </section>

        <section class="photo-container">
            <img src="myphoto.JPG" alt="Selected Work" class="main-photo">
            <div class="photo-watermark">RUILIN MAO 摄影</div>
        </section>
    </main>

</body>
</html>
